# snes-sway configuration
# Copy to ~/.config/snes-sway/config.yaml
# Or use Home Manager: services.snes-sway.enable = true;

# Device settings
device:
  # Auto-detect Arduino Leonardo by USB ID (default)
  # Set path to override auto-detection
  # path: /dev/input/event28
  vendor_id: 0x2341
  product_id: 0x8036

# Mode indicator
indicator:
  # Write current mode to file for waybar
  mode_file: ~/.config/snes-sway/mode
  # Show notification on mode switch
  notify: true

# Mode timeout in seconds (-1 to disable)
# After this time of inactivity, auto-return to default_mode
mode_timeout: 30

# Default mode on startup
default_mode: navigation

# Button mappings per mode
# Available buttons: a, b, x, y, l, r, up, down, left, right
# Modifier buttons (do nothing alone): start, select
# Chord buttons: select+<btn>, start+<btn>
#
# Actions:
#   sway:<command>  - run swaymsg <command>
#   exec:<command>  - run shell command
#   key:<keyname>   - send keypress via wtype (e.g., key:Up, key:Return)
#   mouse:<action>  - mouse control (requires wlrctl/dotool)
#                     click_left, click_right, click_middle, double_left
#                     hold_left, hold_right, release_left, release_right
#                     move_up, move_down, move_left, move_right
#                     optional speed: mouse:move_up:30
#   mode:<name>     - switch to mode

modes:
  navigation:
    # D-pad: window focus
    up:     "sway:focus up"
    down:   "sway:focus down"
    left:   "sway:focus left"
    right:  "sway:focus right"
    # A: enter input mode (D-pad sends arrow keys)
    a:      "mode:input"
    b:      "sway:scratchpad show"
    x:      "sway:floating toggle"
    y:      "sway:layout toggle split"
    # Shoulders: workspace navigation
    l:      "sway:workspace prev"
    r:      "sway:workspace next"
    # Select chords
    select+a: "sway:fullscreen toggle"
    select+b: "sway:kill"
    select+l: "sway:focus output left"
    select+r: "sway:focus output right"
    select+x: "mode:mouse"
    # Start chords
    start+a:  "exec:wofi --show drun"
    start+b:  "mode:launcher"

  input:
    # D-pad sends arrow keys to focused window
    up:     "key:Up"
    down:   "key:Down"
    left:   "key:Left"
    right:  "key:Right"
    # A: Enter/confirm
    a:      "key:Return"
    # B: exit input mode
    b:      "mode:navigation"
    x:      "key:Escape"
    y:      "key:Tab"
    l:      "key:Page_Up"
    r:      "key:Page_Down"
    # Select chords still work
    select+b: "sway:kill"
    select+l: "sway:focus output left"
    select+r: "sway:focus output right"

  mouse:
    # D-pad moves cursor (hold to repeat with acceleration)
    up:     "mouse:move_up:16"
    down:   "mouse:move_down:16"
    left:   "mouse:move_left:16"
    right:  "mouse:move_right:16"
    # A: left click
    a:      "mouse:click_left"
    # B: exit mouse mode
    b:      "mode:navigation"
    # X: right click
    x:      "mouse:click_right"
    # Y: middle click
    y:      "mouse:click_middle"
    # Shoulders: fast horizontal movement
    l:      "mouse:move_left:50"
    r:      "mouse:move_right:50"
    # Select chords: precision movement
    select+up:    "mouse:move_up:4"
    select+down:  "mouse:move_down:4"
    select+left:  "mouse:move_left:4"
    select+right: "mouse:move_right:4"
    select+a:     "mouse:double_left"
    select+x:     "mode:drag"
    select+b:     "sway:kill"

  drag:
    # Left button held while in this mode
    # Movement for text selection or window dragging
    up:     "mouse:move_up:16"
    down:   "mouse:move_down:16"
    left:   "mouse:move_left:16"
    right:  "mouse:move_right:16"
    # A or B: release and exit
    a:      "mouse:release_left"
    b:      "mouse:release_left"
    # Fast movement
    l:      "mouse:move_left:50"
    r:      "mouse:move_right:50"
    # Precision
    select+up:    "mouse:move_up:4"
    select+down:  "mouse:move_down:4"
    select+left:  "mouse:move_left:4"
    select+right: "mouse:move_right:4"

  launcher:
    # D-pad: still navigate
    up:     "sway:focus up"
    down:   "sway:focus down"
    left:   "sway:focus left"
    right:  "sway:focus right"
    # Face buttons: quick app launch
    a:      "exec:foot"
    b:      "exec:firefox"
    x:      "exec:thunar"
    y:      "exec:code"
    # Shoulders: workspace navigation
    l:      "sway:workspace prev"
    r:      "sway:workspace next"
    # Chords
    select+b: "sway:kill"
    start+a:  "exec:wofi --show drun"
    start+b:  "mode:navigation"
